name: Build Native Plugin

on:
  push:
    branches: [main]
    paths:
      - 'native~/**'
      - '.github/workflows/build-native.yml'
    tags:
      - 'v*'
  pull_request:
    branches: [main]
    paths:
      - 'native~/**'
      - '.github/workflows/build-native.yml'
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S native~ -B native~/build -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build native~/build --config Release

      - name: Verify output
        run: |
          if (!(Test-Path "Runtime/Plugins/Windows/x64/displayxr_unity.dll")) {
            Write-Error "DLL not found at expected path"
            exit 1
          }
          Write-Host "Built successfully: Runtime/Plugins/Windows/x64/displayxr_unity.dll"
          Get-Item "Runtime/Plugins/Windows/x64/displayxr_unity.dll" | Select-Object Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: displayxr_unity-windows-x64
          path: Runtime/Plugins/Windows/x64/displayxr_unity.dll

  build-macos:
    name: macOS (Universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S native~ -B native~/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"

      - name: Build
        run: cmake --build native~/build --config Release

      - name: Verify output
        run: |
          BUNDLE="Runtime/Plugins/macOS/displayxr_unity.bundle"
          if [ ! -d "$BUNDLE" ]; then
            echo "ERROR: Bundle not found at $BUNDLE"
            exit 1
          fi
          echo "Built successfully: $BUNDLE"
          ls -la "$BUNDLE"
          file "$BUNDLE/displayxr_unity" 2>/dev/null || file "$BUNDLE/Contents/MacOS/displayxr_unity" 2>/dev/null || echo "Binary location varies by CMake version"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: displayxr_unity-macos
          path: Runtime/Plugins/macOS/displayxr_unity.bundle

  # ── Release job: runs on v* tags ──────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: displayxr_unity-windows-x64
          path: Runtime/Plugins/Windows/x64/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: displayxr_unity-macos
          path: Runtime/Plugins/macOS/

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION=$(jq -r .version package.json)
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "WARNING: package.json version ($PKG_VERSION) != tag version ($TAG_VERSION)"
            echo "Updating package.json to match tag..."
            jq --arg v "$TAG_VERSION" '.version = $v' package.json > package.json.tmp
            mv package.json.tmp package.json
          fi

      - name: Create UPM tarball
        run: |
          # Build the package directory with binaries included
          PKG_DIR="com.displayxr.unity-${{ steps.version.outputs.version }}"
          mkdir "$PKG_DIR"
          # Copy package contents (everything Unity needs)
          cp -r Runtime/ "$PKG_DIR/Runtime/"
          cp Runtime.meta "$PKG_DIR/Runtime.meta"
          cp -r Editor/ "$PKG_DIR/Editor/"
          cp Editor.meta "$PKG_DIR/Editor.meta"
          cp -r Samples~/ "$PKG_DIR/Samples~/" 2>/dev/null || true
          cp package.json "$PKG_DIR/"
          cp README.md "$PKG_DIR/"
          cp CHANGELOG.md "$PKG_DIR/"
          cp LICENSE "$PKG_DIR/"
          # Create tarball (npm pack format that UPM understands)
          tar czf "com.displayxr.unity-${{ steps.version.outputs.version }}.tgz" "$PKG_DIR"
          echo "Created: com.displayxr.unity-${{ steps.version.outputs.version }}.tgz"
          ls -lh *.tgz

      - name: Push upm branch with binaries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Create orphan upm branch from the tag contents + binaries
          git checkout -B upm
          # Force-add the binaries (normally gitignored or absent)
          git add -f Runtime/Plugins/Windows/x64/displayxr_unity.dll
          git add -f Runtime/Plugins/macOS/displayxr_unity.bundle
          git commit -m "Release ${{ github.ref_name }}: add native binaries for UPM git install"
          git push -f origin upm
          # Also tag the upm branch for version-pinned installs
          git tag -f "upm/${{ github.ref_name }}"
          git push -f origin "upm/${{ github.ref_name }}"

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md
          VERSION="${{ steps.version.outputs.version }}"
          # Get content between this version header and the next version header
          NOTES=$(sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | sed '$d')
          if [ -z "$NOTES" ]; then
            NOTES="Release $VERSION"
          fi
          # Write to file for gh release
          echo "$NOTES" > release_notes.md
          cat release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "DisplayXR ${{ github.ref_name }}" \
            --notes-file release_notes.md \
            "com.displayxr.unity-${{ steps.version.outputs.version }}.tgz#UPM Package (.tgz)"

  # ── Package job: runs on main push (non-tag) ─────────────────────────
  package:
    name: Package Plugin Binaries
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: displayxr_unity-windows-x64
          path: Runtime/Plugins/Windows/x64/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: displayxr_unity-macos
          path: Runtime/Plugins/macOS/

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: displayxr-unity-plugin
          path: |
            Runtime/
            Runtime.meta
            Editor/
            Editor.meta
            Samples~/
            package.json
            README.md
            CHANGELOG.md
            LICENSE
